<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<body>
    <div class="sidebar">
        <div class="account">
            <div class="account-photo"><img src="images/profile-pic.jpg" alt="user photo"></div>
            <div class="account-details">
                <div>Ei-kun</div>
                <div>eikun@gmail.com</div>
            </div>
        </div>
        <div class="searchbar">
            <input type="text" placeholder="Search">
            <button class="image"><img src="images/search.svg"></button>
        </div>
        <div class="default">
            <div class="tabs today" id="a6ca0ab5-49e6-4d9c-9415-582b74af796d">
                <div class="image"><img src="images/today.svg"></div>
                <div class="tab-name">My Day</div>
            </div>
            <div class="tabs important" id="0d7f884c-9f8f-4a88-a9a6-07b9ab9b16b6">
                <div class="image"><img src="images/important.svg"></div>
                <div class="tab-name">Important</div>
            </div>
            <div class="tabs complete" id="46394a68-b3b8-4703-a0b7-6fa283a9f2ba">
                <div class="image"><img src="images/completed.svg"></div>
                <div class="tab-name">Completed</div>
            </div>
            <div class="tabs" id="ea2ad110-82d8-405e-9f74-9d6a8bd8c5b8">
                <div class="image"><img src="images/tasks.svg"></div>
                <div class="tab-name">Tasks</div>
            </div>
        </div>
        <div class="custom default">
            <div class="tabs" id="e61a5224-efa7-4271-b430-63bec29fa043">
                <div class="image"><img src="images/home.svg"></div>
                <div class="tab-name">Home</div>
            </div>
        </div>
        <div class="add">
            <div class="new-list">
                <button class="image"><img src="images/plus.svg"></button>
                <div>New List</div>
            </div>
            <button class="image create-group"><img src="images/create-group.svg"></button>
        </div>
    </div>
    <div class="content">
        <div class="heading">
            <header></header>
        </div>
        <div class="time"></div>
        <div class="taskContainer"></div>
        <div class="add-task">
            <button class="image"><img src="images/plus.svg"></button>
            <input type="text" placeholder="Add a task">
            <button class="image hidden option due">
                <img src="images/calendar.svg">
                <div></div>
            </button>
            <div class="popup hidden">
                <button>
                    <img src="images/currentday.svg">
                    <div class="button-value">Today</div>
                    <div class="currentday deadline"></div>
                </button>
                <button>
                    <img src="images/nextday.svg">
                    <div class="button-value">Tomorrow</div>
                    <div class="nextday deadline"></div>
                </button>
                <button class="next-week">
                    <img src="images/nextweek.svg">
                    <div class="button-value">Next Week</div>
                    <div class="nextweek deadline"></div>
                </button>
                <div class="divider"></div>
                <button class="pickDate">
                    <img src="images/calendar.svg">
                    <div class="button-value">Pick a Date</div>
                    <input type="date" class="date-input">
                </button>
                <button class="delete hidden">
                    <img src="images/delete.svg">
                    <div>Remove due date</div>
                </button>
            </div>
            <button class="image hidden option interval">
                <img src="images/calendar-repeat.svg">
                <div></div>
            </button>
            <div class="popup hidden">
                <button>
                    <img src="images/daily.svg">
                    <div class="button-value">Daily</div>
                </button>
                <button>
                    <img src="images/weekdays.svg">
                    <div class="button-value">Weekdays</div>
                </button>
                <button>
                    <img src="images/weekly.svg">
                    <div class="button-value">Weekly</div>
                </button>
                <button>
                    <img src="images/monthly.svg">
                    <div class="button-value">Monthly</div>
                </button>
                <button class="hidden delete">
                    <img src="images/delete.svg">
                    <div>Never Repeat</div>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
