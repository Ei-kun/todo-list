<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo list</title>
</head>
<body>
    <div class="sidebar">
        <div class="account">
            <div class="account-photo"><img src="https://avatars.githubusercontent.com/u/231045566?v=4&size=64" alt="user photo"></div>
            <div class="account-details">
                <div>Ei-kun</div>
                <div>eikun@gmail.com</div>
            </div>
        </div>
        <div class="searchbar">
            <input type="text" placeholder="Search">
            <button class="image"><img src="images/search.svg"></button>
        </div>
        <div class="default">
            <div class="tabs">
                <div class="image"><img src="images/today.svg"></div>
                <div>My Day</div>
            </div>
            <div class="tabs">
                <div class="image"><img src="images/important.svg"></div>
                <div>Important</div>
            </div>
            <div class="tabs">
                <div class="image"><img src="images/completed.svg"></div>
                <div>Completed</div>
            </div>
            <div class="tabs">
                <div class="image"><img src="images/tasks.svg"></div>
                <div>Tasks</div>
            </div>
        </div>
        <div class="custom default">
            <div class="tabs">
                <div class="image"><img src="images/home.svg"></div>
                <div>Home</div>
            </div>
        </div>
        <div class="add">
            <div class="new-list">
                <button class="image"><img src="images/plus.svg"></button>
                <div>New List</div>
            </div>
            <button class="image create-group"><img src="images/create-group.svg"></button>
        </div>
    </div>
    <div class="content">
        <header>day</header>
        <div class="add-task">
            <button class="image"><img src="images/plus.svg"></button>
            <input type="text" placeholder="Add a task">
            <button class="image hidden"><img src="images/calendar.svg"></button>
            <button class="image hidden"><img src="images/alarm.svg"></button>
            <button class="image hidden"><img src="images/calendar-repeat.svg"></button>
        </div>
    </div>
</body>
</html>
